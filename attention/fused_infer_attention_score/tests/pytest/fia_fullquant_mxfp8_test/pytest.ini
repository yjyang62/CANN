[pytest]
markers =
    ci: mark a test as a CI test
    func_rdv: mark a test as a functional correctness RDV test
    perf_rdv: mark a test as a performance/stress RDV test
    debug: mark a test as a daily debug test
    graph: marks tests as graph mode compilation tests
    npu_only: mark a test as NPU-only execution without CPU golden comparison
